<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Compliance Suite ESG-Social · Demo</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%230F4C81'/%3E%3Ctext x='16' y='22' font-family='Arial' font-size='18' font-weight='bold' fill='white' text-anchor='middle'%3EA%3C/text%3E%3C/svg%3E">
<style>
:root{
  --blu:#0F4C81; --blu-scuro:#0A3658; --blu-chiaro:#E8F0F8;
  --verde:#1A7F4E; --verde-bg:#E6F4EC;
  --giallo:#B7791F; --giallo-bg:#FDF3E1;
  --arancio:#C05621; --arancio-bg:#FBE9DC;
  --grigio:#5F6B7A; --grigio-bg:#EEF1F4;
  --testo:#1A2330; --testo-2:#4A5568; --bordo:#D9E0E8;
  --bg:#F4F7FA; --card:#FFFFFF;
  --ombra:0 4px 16px rgba(15,40,70,.08); --ombra-2:0 10px 32px rgba(15,40,70,.16);
  --r:12px;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{font-family:'Segoe UI',Inter,system-ui,-apple-system,Arial,sans-serif;background:var(--bg);color:var(--testo);font-size:16px;overflow:hidden}
h1,h2,h3{text-wrap:balance}
:focus-visible{outline:2px solid var(--blu);outline-offset:2px;border-radius:4px}
.db :focus-visible,.modal-dark :focus-visible{outline-color:#7FB1E0}
::placeholder{color:#5F6B7A;opacity:1}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}}
#app{height:100vh;display:flex;flex-direction:column}

/* ---------- cornice comune ---------- */
.vista-badge{position:fixed;top:14px;right:16px;z-index:900;font-size:13px;font-weight:600;padding:6px 14px;border-radius:100px;letter-spacing:.3px}
.vista-pmi{background:var(--blu-chiaro);color:var(--blu)}
.vista-banca{background:#10243A;color:#9FC3E8;border:1px solid #2A4A6E}
.fase2-badge{position:fixed;top:52px;right:16px;z-index:900;font-size:12px;font-weight:600;padding:6px 12px;border-radius:100px;background:#FFF7E6;color:#8A6D1D;border:1px solid #EAD9A8}
.footer-demo{position:fixed;bottom:46px;left:0;right:0;text-align:center;font-size:12px;color:#5A6B80;z-index:800;pointer-events:none}
.footer-demo.dark{color:rgba(200,216,232,.6)}
#stepLabel{position:fixed;bottom:18px;left:16px;z-index:900;font-size:12px;font-weight:600;color:#5A6B80;pointer-events:none;letter-spacing:.3px}
#stepLabel.dark{color:rgba(200,216,232,.6)}
.dots{position:fixed;bottom:10px;left:0;right:0;display:flex;justify-content:center;align-items:center;gap:2px;z-index:900}
.dot{width:19px;height:19px;border-radius:50%;background:transparent;cursor:pointer;border:none;padding:0;position:relative}
.dot::after{content:"";position:absolute;inset:5px;border-radius:50%;background:#C3CDD8;transition:all .25s}
.dot:hover::after{background:#94A6B8}
.dot.attivo::after{background:var(--blu);transform:scale(1.35)}
.nav-freccia{width:28px;height:28px;border-radius:50%;border:1px solid var(--bordo);background:rgba(255,255,255,.92);color:var(--grigio);cursor:pointer;font-size:17px;line-height:1;display:flex;align-items:center;justify-content:center;padding:0 0 2px;margin:0 8px;transition:border-color .15s,color .15s;font-family:inherit}
.nav-freccia:hover:not(:disabled){border-color:var(--blu);color:var(--blu)}
.nav-freccia:disabled{opacity:.35;cursor:default}
.schermata{position:absolute;inset:0;display:none;opacity:0;overflow:auto;padding-bottom:84px}
.schermata.visibile{display:block;opacity:1;animation:entra .32s ease}
@keyframes entra{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:none}}
.stage{position:relative;flex:1;overflow:hidden}

/* ---------- componenti ---------- */
.btn{display:inline-block;border:none;border-radius:10px;font-size:16px;font-weight:600;cursor:pointer;transition:all .2s;font-family:inherit}
.btn-pri{background:var(--blu);color:#fff;padding:14px 28px}
.btn-pri:hover{background:var(--blu-scuro);transform:translateY(-1px)}
.btn-pri:disabled{background:#A8B6C4;cursor:not-allowed;transform:none}
.btn-sec{background:#fff;color:var(--blu);border:1.5px solid var(--blu);padding:13px 26px}
.btn-sec:hover{background:var(--blu-chiaro)}
.link-btn{background:none;border:none;color:var(--blu);font-weight:700;cursor:pointer;text-decoration:underline;font:inherit;padding:0;white-space:nowrap}
.card{background:var(--card);border-radius:var(--r);box-shadow:var(--ombra);border:1px solid var(--bordo)}
.logo-banca{display:flex;align-items:center;gap:10px;font-weight:700;color:var(--blu);font-size:19px}
.logo-banca .glifo{width:34px;height:34px;border-radius:8px;background:var(--blu);color:#fff;display:flex;align-items:center;justify-content:center;font-size:17px}
.toast{position:fixed;top:96px;right:16px;z-index:1200;background:#16202C;color:#fff;padding:14px 20px;border-radius:10px;box-shadow:var(--ombra-2);font-size:15px;opacity:0;transform:translateY(-8px);transition:all .3s;max-width:min(420px,calc(100vw - 32px));pointer-events:none}
.toast.on{opacity:1;transform:translateY(0)}
.toast.ok{background:var(--verde)}
input[type=text],input[type=email],input[type=password]{width:100%;padding:12px 14px;border:1.5px solid var(--bordo);border-radius:9px;font-size:16px;font-family:inherit;color:var(--testo);background:#fff}
input:focus,select:focus{outline:none;border-color:var(--blu);box-shadow:0 0 0 3px color-mix(in srgb,var(--blu) 16%,transparent)}
input[readonly]{background:var(--grigio-bg);color:var(--testo-2)}
label.lbl{display:block;font-size:13.5px;font-weight:600;color:var(--testo-2);margin:0 0 6px}
.campo{margin-bottom:16px}
.spunta-anim{width:88px;height:88px;border-radius:50%;background:var(--verde);display:flex;align-items:center;justify-content:center;margin:0 auto;animation:pop .5s cubic-bezier(.2,1.6,.5,1)}
.spunta-anim svg{width:46px;height:46px}
@keyframes pop{0%{transform:scale(0)}100%{transform:scale(1)}}
.passi{display:flex;justify-content:center;gap:6px;margin-bottom:26px;flex-wrap:nowrap;white-space:nowrap}
.passo-chip{font-size:12px;font-weight:600;color:#5A6B80;background:#fff;border:1px solid var(--bordo);padding:4px 10px;border-radius:100px}
.passo-chip.fatto{color:var(--verde);border-color:#BBDFC9;background:var(--verde-bg)}
.passo-chip.ora{color:var(--blu);border-color:var(--blu);background:var(--blu-chiaro)}
.centro{max-width:860px;margin:0 auto;padding:40px 24px 110px;min-height:100%;display:flex;flex-direction:column;justify-content:center}
.centro-s{max-width:600px;margin:0 auto;padding:40px 24px 110px;min-height:100%;display:flex;flex-direction:column;justify-content:center}
.centro h1,.centro-s h1{text-align:center;font-size:25px;margin-bottom:6px}
.sottotitolo{text-align:center;color:var(--testo-2);font-size:15px;margin-bottom:22px}

/* ---------- 1 comunicazione ---------- */
.msg-head{display:flex;justify-content:space-between;align-items:center;padding:18px 150px 18px 28px;background:#fff;border-bottom:1px solid var(--bordo)}
.badge-imp{background:#FDEAEA;color:#B43030;font-size:12.5px;font-weight:700;padding:5px 12px;border-radius:100px}
.msg-card{max-width:720px;margin:42px auto;padding:40px 46px}
.msg-meta{font-size:13.5px;color:var(--testo-2);margin-bottom:6px}
.msg-ogg{font-size:22px;font-weight:700;margin:10px 0 20px;line-height:1.35}
.msg-corpo{font-size:16px;line-height:1.65;color:var(--testo)}
.box-scad{margin:24px 0;padding:18px 22px;background:var(--blu-chiaro);border:1px solid color-mix(in srgb,var(--blu) 28%,#fff);border-radius:10px}
.box-scad b{font-size:17px;color:var(--blu)}
.box-scad span{display:block;font-size:13px;color:var(--testo-2);margin-top:3px}
.motivi{margin:18px 0 6px;padding:0 0 0 2px;font-size:15px;color:var(--testo-2);line-height:1.7}
.motivi li{margin-left:20px}

/* ---------- 2 home banking ---------- */
.hb{display:flex;height:100%;background:#fff}
.hb-side{width:230px;background:#0E1E30;color:#B9C7D6;padding:24px 0;flex-shrink:0}
.hb-side .logo{padding:0 22px 24px;color:#fff;font-weight:700;font-size:17px;display:flex;gap:9px;align-items:center}
.hb-side .logo .glifo{width:28px;height:28px;border-radius:6px;background:var(--blu);display:flex;align-items:center;justify-content:center;font-size:14px;color:#fff}
.hb-voce{padding:12px 22px;font-size:15px;cursor:default}
.hb-voce.attiva{background:rgba(255,255,255,.12);color:#fff;font-weight:600}
.hb-main{flex:1;display:flex;flex-direction:column;overflow:auto}
.hb-top{display:flex;justify-content:space-between;align-items:center;padding:14px 150px 14px 28px;border-bottom:1px solid var(--bordo);background:#fff;position:sticky;top:0;z-index:5}
.hb-utente{font-size:14px;color:var(--testo-2)}
.notifica-bar{display:flex;align-items:center;gap:12px;background:#FFF7E6;border:1px solid #EAD9A8;border-radius:10px;padding:13px 18px;margin:20px 28px 0;font-size:14.5px}
.notifica-bar .ico{width:30px;height:30px;border-radius:50%;background:#F4D06F;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.notifica-bar a{color:var(--blu);font-weight:700;cursor:pointer;text-decoration:underline;white-space:nowrap}
.bonifico-wrap{max-width:560px;margin:26px auto;width:100%;padding:0 24px}
.bonifico{padding:30px 34px}
.bonifico h2{font-size:19px;margin-bottom:20px}
.b-campo{margin-bottom:14px}
.b-campo .lbl{margin-bottom:4px}
.conf-bonifico{text-align:center;padding:34px}
.conf-bonifico .mini-spunta{width:54px;height:54px;border-radius:50%;background:var(--verde);color:#fff;display:flex;align-items:center;justify-content:center;margin:0 auto 14px;font-size:26px}

/* ---------- 3 clausole (modal) ---------- */
.overlay-scuro{position:absolute;inset:0;background:rgba(10,20,32,.55);display:flex;align-items:center;justify-content:center;padding:24px;overflow:auto}
.modal{background:#fff;border-radius:16px;max-width:640px;width:100%;padding:34px 38px;box-shadow:var(--ombra-2);max-height:88vh;overflow:auto}
.modal h2{font-size:20px;margin-bottom:6px}
.modal .sotto{font-size:14.5px;color:var(--testo-2);margin-bottom:18px}
.clausole-testo{font-size:14.5px;line-height:1.6;color:var(--testo-2);background:var(--grigio-bg);border-radius:9px;padding:16px 18px;margin-bottom:18px;max-height:250px;overflow:auto}
.check-riga{display:flex;gap:10px;align-items:flex-start;margin-bottom:11px;font-size:14.5px;cursor:pointer}
.check-riga input{width:18px;height:18px;margin-top:2px;flex-shrink:0;cursor:pointer}
.nota-rimborso{font-size:12.5px;color:#5A6B80;margin:8px 0 18px}

/* ---------- 4 piano ---------- */
.piani{display:flex;gap:22px;justify-content:center;margin-top:30px;flex-wrap:wrap}
.piano{width:330px;padding:30px;cursor:pointer;border:2px solid var(--bordo);position:relative;transition:all .2s;border-radius:var(--r);background:#fff;display:flex;flex-direction:column}
.piano ul{flex:1}
.piano:hover{transform:translateY(-3px);box-shadow:var(--ombra-2)}
.piano.scelto{border-color:var(--blu);box-shadow:var(--ombra-2)}
.piano .tag{position:absolute;top:-13px;left:50%;transform:translateX(-50%);background:var(--verde);color:#fff;font-size:12px;font-weight:700;padding:4px 14px;border-radius:100px;white-space:nowrap}
.piano h3{font-size:17px;margin-bottom:8px}
.piano .prezzo{font-size:34px;font-weight:800;color:var(--blu)}
.piano .prezzo small{font-size:15px;font-weight:600;color:var(--testo-2)}
.piano ul{list-style:none;margin-top:16px;font-size:14px;color:var(--testo-2);line-height:1.9}
.piano ul li::before{content:"✓";color:var(--verde);font-weight:700;margin-right:8px}
.iva-nota{text-align:center;font-size:12.5px;color:#5A6B80;margin-top:16px}

/* ---------- 5 carrello ---------- */
.riepilogo{padding:26px 30px}
.r-riga{display:flex;justify-content:space-between;font-size:15.5px;padding:11px 0;border-bottom:1px solid var(--grigio-bg)}
.r-riga.tot{border:none;font-weight:800;font-size:18px;padding-top:16px}
.promo{display:flex;gap:10px;margin-top:18px}
.promo input{flex:1}

/* ---------- 8 pagamento ---------- */
.pay-modal{max-width:480px}
.carte{display:flex;gap:8px;margin-bottom:18px}
.carta-badge{font-size:11.5px;font-weight:700;border:1px solid var(--bordo);border-radius:6px;padding:5px 10px;color:var(--testo-2);background:#fff}
.pay-riga{display:flex;gap:12px}
.pay-riga .campo{flex:1}
.spinner{width:46px;height:46px;border:4px solid var(--blu-chiaro);border-top-color:var(--blu);border-radius:50%;margin:0 auto;animation:gira .8s linear infinite}
@keyframes gira{to{transform:rotate(360deg)}}

/* ---------- 9 questionario ---------- */
.q-head{display:flex;justify-content:space-between;align-items:center;padding:16px 150px 16px 28px;background:#fff;border-bottom:1px solid var(--bordo);position:sticky;top:0;z-index:5}
.q-azienda{display:flex;gap:26px;font-size:13.5px;color:var(--testo-2);background:var(--blu-chiaro);border-radius:10px;padding:13px 20px;margin:22px auto 6px;max-width:880px}
.q-azienda b{color:var(--testo)}
.q-prog{max-width:880px;margin:14px auto 4px;padding:0 4px;display:flex;justify-content:space-between;font-size:13.5px;color:var(--testo-2);font-weight:600}
.q-barra{max-width:880px;margin:6px auto 18px;height:8px;border-radius:100px;background:#E2E9F0;overflow:hidden}
.q-barra div{height:100%;background:var(--verde);border-radius:100px;transition:width .3s;width:0}
.q-lista{max-width:880px;margin:0 auto;padding:0 0 120px}
.q-item{display:flex;justify-content:space-between;align-items:center;gap:18px;background:#fff;border:1px solid var(--bordo);border-radius:10px;padding:13px 18px;margin-bottom:10px}
.q-item .testo{font-size:14.5px;line-height:1.45;flex:1}
@media(min-width:1280px){
  .q-lista{max-width:1380px;display:grid;grid-template-columns:1fr 1fr;gap:10px 18px;align-content:start}
  .q-item{margin-bottom:0}
  .q-sez{grid-column:1/-1}
  .q-footer{grid-column:1/-1;margin-top:10px}
  .q-azienda,.q-prog,.q-barra{max-width:1380px}
}
.q-item .num{font-weight:800;color:var(--blu);margin-right:6px}
.toggle{display:flex;gap:8px;flex-shrink:0}
.tg{border:1.5px solid var(--bordo);background:#fff;border-radius:9px;padding:8px 19px;font-size:15px;font-weight:700;cursor:pointer;color:var(--testo-2);font-family:inherit;transition:all .15s}
.tg.si.on{background:var(--verde);border-color:var(--verde);color:#fff}
.tg.no.on{background:var(--grigio);border-color:var(--grigio);color:#fff}
.q-footer{max-width:880px;margin:6px auto 0;text-align:center}
.q-dpr{font-size:12px;color:#5A6B80;margin-top:12px}
.q-sez{font-size:12px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;color:var(--blu);background:var(--blu-chiaro);border-radius:8px;padding:9px 14px;margin:16px 0 6px}
.q-sez:first-child{margin-top:0}
.q-input{display:flex;align-items:center;gap:8px;flex-shrink:0}
.q-input input{width:148px;padding:9px 12px;text-align:right}
.q-input.has-u input{width:118px}
.q-input.wide input{width:248px;text-align:left}
.q-input input:disabled{background:var(--grigio-bg);color:#9AA7B4;cursor:not-allowed}
.q-unit{font-size:13px;font-weight:700;color:var(--testo-2);min-width:30px}
.q-item.cond-off{opacity:.55}
.q-item.cond-off .num{color:var(--grigio)}

/* ---------- 10 firma ---------- */
.split{display:flex;gap:30px;max-width:1080px;margin:0 auto;padding:34px 24px;align-items:flex-start}
.doc-prev{flex:1.2;background:#fff;border:1px solid var(--bordo);border-radius:8px;box-shadow:var(--ombra);padding:34px 38px;font-size:12.5px;line-height:1.55;min-width:0}
.doc-prev .d-head{display:flex;justify-content:space-between;border-bottom:2px solid var(--blu);padding-bottom:10px;margin-bottom:14px;font-weight:700;color:var(--blu);font-size:13px}
.doc-prev h3{font-size:16px;text-align:center;margin:8px 0 14px}
.doc-prev table{width:100%;border-collapse:collapse;font-size:11.5px;margin-top:8px}
.doc-prev td{border:1px solid #E2E9F0;padding:5px 8px}
.doc-prev .firma-box{border:1.5px dashed #B9C7D6;border-radius:6px;padding:14px;margin-top:16px;text-align:center;color:#5A6B80;font-size:11.5px;min-height:58px;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:4px}
.doc-prev .firma-box.firmato{border-color:var(--verde);color:var(--verde);background:var(--verde-bg);font-weight:600}
.firma-col{flex:1;position:sticky;top:20px}
.firma-card{padding:28px 30px}
.badge-firma{display:inline-flex;align-items:center;gap:7px;font-size:12.5px;font-weight:700;padding:6px 12px;border-radius:100px;margin:0 6px 8px 0}
.bf-ok{background:var(--verde-bg);color:var(--verde)}
.bf-info{background:var(--blu-chiaro);color:var(--blu)}
.passi-num{font-size:14.5px;color:var(--testo-2);line-height:1.9;margin:12px 0 18px}

/* ---------- 11 dashboard ---------- */
.db{background:#0C1A2A;min-height:100%;color:#DCE6F0}
.db-top{display:flex;justify-content:space-between;align-items:center;padding:16px 160px 16px 30px;background:#0E2238;border-bottom:1px solid #1E3A55}
.db-top .logo-banca{color:#fff}
.db-top .logo-banca .glifo{background:#5C9CE0}
.db-badge{font-size:13px;color:#9FC3E8;background:#15304C;padding:6px 14px;border-radius:100px}
.db-wrap{max-width:1240px;margin:0 auto;padding:24px 30px 130px}
.kpi-riga{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
.kpi{background:#11283F;border:1px solid #1E3A55;border-radius:12px;padding:20px 22px}
.kpi .v{font-size:30px;font-weight:800;color:#fff}
.kpi .v small{font-size:15px;color:#7FB1E0;font-weight:700}
.kpi .l{font-size:13px;color:#8FA8C2;margin-top:5px}
.db-griglia{display:grid;grid-template-columns:1.4fr 1fr;gap:16px;margin-top:16px}
.pannello{background:#11283F;border:1px solid #1E3A55;border-radius:12px;padding:20px 22px}
.pannello h3{font-size:14.5px;color:#B9D2EA;margin-bottom:14px;font-weight:600}
.pannello h3 small{display:block;font-weight:400;color:#8FA8C2;font-size:12px;margin-top:3px}
.area-svg{width:100%;height:150px}
.donut-wrap{display:flex;align-items:center;gap:22px}
.donut{width:130px;height:130px;border-radius:50%;background:conic-gradient(var(--verde) 0 68%, #E0B23E 68% 83.8%, #D97B3F 83.8% 95.9%, #5F6B7A 95.9% 100%);position:relative;flex-shrink:0}
.donut::after{content:"";position:absolute;inset:26px;border-radius:50%;background:#11283F}
.legenda{font-size:13px;line-height:2}
.legenda i{display:inline-block;width:10px;height:10px;border-radius:3px;margin-right:8px}
.dom-bars{margin-top:4px}
.dom-bar{display:flex;align-items:center;gap:10px;margin-bottom:7px;font-size:12.5px}
.dom-bar .n{width:32px;color:#8FA8C2;font-weight:700;text-align:right;flex-shrink:0}
.dom-bar .traccia{flex:1;height:13px;border-radius:100px;background:#1A3450;overflow:hidden;display:flex}
.dom-bar .si{height:100%;background:var(--verde)}
.dom-bar .no{height:100%;background:#D97B3F}
.dom-bar .pct{width:122px;color:#B9D2EA;flex-shrink:0;font-weight:600;white-space:nowrap}
.db-tab-wrap{margin-top:16px}
.db-strumenti{display:flex;gap:12px;margin-bottom:14px}
.db-strumenti input,.db-strumenti select{background:#0E2238;border:1px solid #1E3A55;color:#DCE6F0;border-radius:8px;padding:10px 14px;font-size:14px;font-family:inherit}
.db-strumenti input::placeholder{color:#8FA8C2}
.db-strumenti input:focus,.db-strumenti select:focus{border-color:#5C9CE0;box-shadow:0 0 0 3px rgba(92,156,224,.18)}
.db-strumenti input{flex:1;max-width:340px}
table.clienti{width:100%;border-collapse:collapse;font-size:14px}
table.clienti th{text-align:left;font-size:12px;text-transform:uppercase;letter-spacing:.6px;color:#8FA8C2;padding:10px 12px;border-bottom:1px solid #1E3A55}
table.clienti td{padding:12px;border-bottom:1px solid #16304A}
tr.evidenzia{animation:flash 2s ease}
@keyframes flash{0%,60%{background:#1C4A33}100%{background:transparent}}
.stato{font-size:12px;font-weight:700;padding:4px 11px;border-radius:100px;white-space:nowrap}
.s-ric{background:var(--verde-bg);color:#136840}
.s-comp{background:var(--giallo-bg);color:#8A5B10}
.s-soll{background:var(--arancio-bg);color:#A33E0E}
.s-non{background:var(--grigio-bg);color:var(--grigio)}
.db-note{font-size:12.5px;color:#8FA8C2;margin-top:14px}
.btn-ghost{background:transparent;border:1px solid #2A4A6E;color:#9FC3E8;padding:10px 20px;border-radius:9px;font-size:14px;cursor:pointer;font-family:inherit;margin-top:18px}
.btn-ghost:hover{background:#15304C}
tr.cliccabile{cursor:pointer}
tr.cliccabile:hover td{background:#15304C}
.sim-grid{display:grid;grid-template-columns:1.5fr 1fr 1fr 1.3fr;gap:26px;align-items:center}
.sim-ctrl label{display:block;font-size:13px;color:#8FA8C2;margin-bottom:7px}
.sim-ctrl label b{color:#fff;font-size:14px}
.sim-ctrl input[type=range]{width:100%;accent-color:#2EA56B;cursor:pointer}
.sim-kpi .v{font-size:27px;font-weight:800;color:#fff;white-space:nowrap}
.sim-kpi .l{font-size:12.5px;color:#8FA8C2;margin-top:5px;line-height:1.45}
.drawer{position:fixed;top:0;right:0;bottom:0;width:380px;background:#0E2238;border-left:1px solid #1E3A55;z-index:1050;padding:24px 26px;overflow:auto;box-shadow:-12px 0 32px rgba(0,0,0,.35);animation:entraDx .25s ease}
@keyframes entraDx{from{transform:translateX(30px);opacity:0}to{transform:none;opacity:1}}
.drawer-head{display:flex;justify-content:space-between;align-items:center;color:#fff;font-size:16px;margin-bottom:6px}
.drawer-x{background:none;border:none;color:#8FA8C2;font-size:17px;cursor:pointer;padding:4px 8px}
.drawer-cliente{font-size:13.5px;color:#7FB1E0;font-weight:700;margin-bottom:18px}
.drawer-riga{display:flex;gap:13px;align-items:flex-start;font-size:13.5px;color:#B9D2EA;margin-bottom:15px;line-height:1.45}
.drawer-riga b{color:#fff}
.dr-t{flex-shrink:0;font-size:12px;font-weight:800;border:1px solid #2A4A6E;color:#8FA8C2;border-radius:7px;padding:5px 9px;min-width:46px;text-align:center}
.dr-t.fatto{border-color:#2EA56B;color:#7FD7A8}
.dr-t.ora{border-color:#E0B23E;color:#E0B23E}
.drawer-nota{font-size:12.5px;color:#8FA8C2;border-top:1px solid #1E3A55;padding-top:14px;margin-top:6px;line-height:1.5}
.modal-dark{background:#11283F;border:1px solid #2A4A6E;color:#DCE6F0}
.modal-dark h2{color:#fff}
.vig-lista{list-style:none;margin:16px 0 22px}
.vig-lista li{font-size:14.5px;color:#B9D2EA;padding:9px 0 9px 28px;position:relative;border-bottom:1px solid #16304A;line-height:1.45}
.vig-lista li::before{content:"✓";position:absolute;left:4px;color:#7FD7A8;font-weight:800}

/* ---------- interstitial ---------- */
#interstitial{position:fixed;inset:0;background:#0C1A2A;z-index:1500;display:none;align-items:center;justify-content:center;flex-direction:column;gap:18px;color:#fff}
#interstitial.on{display:flex}
#interstitial .ico-grande{font-size:52px}
#interstitial h2{font-size:24px;font-weight:700}
#interstitial p{color:#8FA8C2;font-size:15px}

/* ---------- 12 finale ---------- */
.finale{text-align:center;padding-top:54px}
.finale h1{font-size:28px;margin:22px 0 8px}
.finale .sotto{font-size:16px;color:var(--testo-2);max-width:560px;margin:0 auto}
.card-dvr{max-width:560px;margin:30px auto 0;padding:30px 34px;text-align:left;border-top:4px solid var(--blu)}
.card-dvr h3{font-size:19px;margin-bottom:10px}
.card-dvr p{font-size:14.5px;color:var(--testo-2);line-height:1.6}
.card-dvr ul{list-style:none;margin:14px 0 20px;font-size:14.5px;line-height:2.1}
.card-dvr ul li::before{content:"✓";color:var(--verde);font-weight:800;margin-right:9px}
.nota-archivio{font-size:12.5px;color:#5A6B80;margin-top:18px}

/* ---------- responsive ---------- */
@media(max-width:880px){
  .msg-head,.hb-top,.q-head{padding-right:120px}
  .db-top{padding:14px 120px 14px 16px}
  .kpi-riga{grid-template-columns:1fr 1fr}
  .db-griglia{grid-template-columns:1fr}
  .sim-grid{grid-template-columns:1fr 1fr;gap:18px}
  .split{flex-direction:column;padding:22px 16px}
  .firma-col{position:static;width:100%}
  .db-wrap{padding:20px 16px 130px}
  .donut-wrap{flex-wrap:wrap}
  .q-azienda{flex-wrap:wrap;gap:8px 22px}
}
@media(max-width:640px){
  .hb-side{display:none}
  .msg-head{padding:14px 110px 14px 16px}
  .hb-top,.q-head{padding:12px 110px 12px 16px}
  .msg-card{margin:20px 14px;padding:26px 22px}
  .passi{flex-wrap:wrap;white-space:normal;justify-content:center;row-gap:6px}
  .q-azienda{flex-direction:column;gap:5px}
  .q-item{flex-direction:column;align-items:stretch;gap:10px}
  .q-item .toggle{justify-content:flex-end}
  .piano{width:100%}
  .pay-riga{flex-direction:column;gap:0}
  .pay-riga .campo{flex:none}
  .sim-grid{grid-template-columns:1fr}
  .drawer{width:100%;border-left:none}
  .notifica-bar{flex-wrap:wrap;margin:16px 14px 0}
  .bonifico{padding:22px 20px}
  .doc-prev{padding:22px 18px}
  .db-strumenti{flex-wrap:wrap}
  .db-strumenti input{max-width:none;width:100%;flex:none}
  .db-tab-wrap{overflow-x:auto}
  table.clienti{min-width:540px}
  .dom-bar .pct{width:90px;white-space:normal}
  .kpi .v{font-size:24px}
  .db-badge,#stepLabel{display:none}
  .footer-demo{font-size:11px}
}
</style>
</head>
<body>
<div id="app">
  <div id="vistaBadge" class="vista-badge vista-pmi">Vista PMI</div>
  <div id="fase2Badge" class="fase2-badge" style="display:none">Visione a regime (fase 2)</div>
  <div class="stage" id="stage"></div>
  <div class="footer-demo" id="footerDemo">Ambiente dimostrativo. Dati fittizi.</div>
  <div id="stepLabel"></div>
  <div class="dots" id="dots"></div>
</div>
<div id="interstitial"><svg width="58" height="58" viewBox="0 0 24 24" fill="none" stroke="#9FC3E8" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 21h18M4 18h16M6 18v-7M10 18v-7M14 18v-7M18 18v-7M3 9.5l9-6.5 9 6.5z"/></svg><h2>Cambio prospettiva</h2><p>Vista della banca — Ufficio Crediti Corporate</p></div>
<div id="toast" class="toast"></div>

<script>
/* ============================================================
   CONFIG — tutti i dati fittizi e i testi lunghi in un punto solo
   ============================================================ */
const CONFIG = {

  BANCA_BREVE: "Banca Aurora",
  BANCA_GLIFO: "A",
  BANCA_COLORE: "#0F4C81", BANCA_COLORE2: "#0A3658",
  // brand alternativo per dimostrare il white-label dal vivo (tasto B) — sostituire con la banca vera prima del 25/6

  BANCA_REPARTO: "Ufficio Crediti Corporate",

  PMI_SDI: "M5UXCR1",
  DATA_EBA: new Date(2027, 0, 11),        // 11 gennaio 2027 — applicazione EBA GL/2025/01 (banche SNCI). NON è scadenza clienti.
  TERMINE_BANCA: new Date(2026, 8, 30),    // 30 settembre 2026 — termine fissato dalla banca, configurabile
  TERMINE_BANCA_TXT: "30 settembre 2026",

  // [Questionario ESG-Social — contenuto definitivo fornito dalla banca]
  // A1 "Ragione sociale" è raccolta nella pagina Dati di fatturazione e mostrata in intestazione: non si ripete qui.
  SEZIONI: [
    { id:"A", titolo:"Anagrafica", dom:[
      { id:"A4", t:"Sede operativa", tipo:"testo", ph:"Indirizzo unità produttiva" },
      { id:"A5", t:"N° dipendenti al 31/12/2025", tipo:"num" },
      { id:"A6", t:"Fatturato 2025", tipo:"eur", u:"€" }
    ]},
    { id:"B", titolo:"Environment — ambiente ed emissioni", dom:[
      { id:"B1", t:"Consumi di energia elettrica 2025", tipo:"num", u:"kWh" },
      { id:"B2", t:"Consumi di gas / metano 2025", tipo:"num", u:"Smc" },
      { id:"B3", t:"Sono note le tonnellate di CO₂ emesse nel 2025?", tipo:"sn" },
      { id:"B4", t:"Se sì, tonnellate di CO₂ totali", tipo:"num", u:"ton", cond:"B3" },

    ]},

      { id:"C3", t:"Corsi di formazione obbligatori svolti nel 2025?", tipo:"sn" },
      { id:"C4", t:"N° infortuni sul lavoro nel 2025", tipo:"num" },

      { id:"C6", t:"Dipendenti con visita medica effettuata nel 2025", tipo:"pct", u:"%" },
      { id:"C7", t:"Donne sul totale dei dipendenti", tipo:"pct", u:"%" },
      { id:"C8", t:"Multe o sanzioni INAIL / Ispettorato nel 2025?", tipo:"sn" },

      { id:"D3", t:"Esiste una procedura scritta per segnalare comportamenti scorretti (whistleblowing)?", tipo:"sn" }
    ]},
    { id:"E", titolo:"Obiettivi 2026", dom:[
      { id:"E1", t:"L'azienda si pone un obiettivo di riduzione di consumi / CO₂ nel 2026?", tipo:"sn" },
      { id:"E2", t:"L'azienda si pone un obiettivo di riduzione degli infortuni nel 2026?", tipo:"sn" }
    ]}
  ],
  // profilo virtuoso per autocompilazione (tasto F)
  AUTOFILL: {
    A4:"Via dell'Industria 7, 20090 Segrate (MI)", A5:"18", A6:"2.400.000",
    B1:"84.500", B2:"12.300", B3:"si", B4:"62", B5:"si", B6:"9", B7:"no", B8:"si",
    C1:"si", C2:"si", C3:"si", C4:"1", C5:"23", C6:"100", C7:"32", C8:"no",
    D1:"no", D3:"si", E1:"si", E2:"si"
  },
  // % aggregate sulle domande sì/no (fittizie, per la reportistica di Vigilanza) — [sì%, no%]
  AGG: [
    {id:"B3",si:41,no:59},{id:"B5",si:63,no:37},{id:"B7",si:58,no:42},{id:"B8",si:47,no:53},
    {id:"C1",si:94,no:6},{id:"C2",si:81,no:19},{id:"C3",si:88,no:12},{id:"C8",si:9,no:91},
    {id:"D1",si:4,no:96},{id:"D3",si:71,no:29},{id:"E1",si:67,no:33},{id:"E2",si:79,no:21}
  ],

  CLIENTI: [
    ["Rossi Costruzioni S.r.l.","Edilizia","comp",""],
    ["Meccanica Lariana S.p.A.","Manifattura","ric","12/05/2026"],

    ["Trasporti Bellini S.r.l.","Logistica","soll",""],
    ["Studio Tecnico Ferrari","Servizi","ric","03/06/2026"],
    ["Panificio Moderno S.n.c.","Alimentare","non",""],
    ["Elettroimpianti Nord S.r.l.","Impiantistica","ric","19/05/2026"],
    ["Tessitura Valsesia S.p.A.","Tessile","soll",""],
    ["Carrozzeria 2000 S.r.l.","Automotive","comp",""]
  ]
};

/* ============================================================
   STATO (solo in memoria — nessuna persistenza)
   ============================================================ */
let stato;
function statoIniziale(){ return {
  step: 0,
  bonificoEseguito: false,
  consensi: [false,false,false],
  piano: null,            // 'mensile' | 'annuale'
  promoMsg: "",
  pec: CONFIG.PMI_PEC, pwd: "",
  pagato: false, pagamentoInCorso: false,
  risposte: {},          // { "<id domanda>": valore } — sì/no, numeri, testo
  firmato: false, firmaInCorso: false,
  notificaScattata: false,
  ricerca: "", filtro: "tutti",
  flashRiga: false,
  brandAlt: false,
  simAdesione: 68, simQuota: 10,
  pannelloSoll: null, modalVigilanza: false
};}
function BR(){
  return stato.brandAlt
    ? CONFIG.BANCA_ALT
    : { nome: CONFIG.BANCA_NOME, breve: CONFIG.BANCA_BREVE, glifo: CONFIG.BANCA_GLIFO, colore: CONFIG.BANCA_COLORE, colore2: CONFIG.BANCA_COLORE2 };
}
stato = statoIniziale();

const NOMI_STEP = ["Comunicazione","Home banking","Clausole","Piano","Carrello","Account","Fatturazione","Pagamento","Questionario","Firma","Dashboard banca","Completato"];
const N_STEP = 12;

/* ---------- questionario ESG: helper sullo schema a sezioni ---------- */
const Q_TUTTE = CONFIG.SEZIONI.flatMap(s => s.dom);
function qAttiva(q){ return !q.cond || stato.risposte[q.cond] === "si"; }   // domanda condizionale: attiva solo se il "padre" è sì
function qCompilata(q){ const v = stato.risposte[q.id]; return v !== undefined && v !== null && v !== ""; }
function qConteggio(){
  let tot = 0, done = 0;
  for(const q of Q_TUTTE){ if(!qAttiva(q)) continue; tot++; if(qCompilata(q)) done++; }
  return { done, tot };
}
function qValFirma(q){
  const v = stato.risposte[q.id];
  if(v === undefined || v === null || v === "") return "—";
  if(q.tipo === "sn") return v === "si" ? "Sì" : "No";
  return v + (q.u ? " " + q.u : "");
}
function qItem(q){
  const attivo = qAttiva(q);
  const v = stato.risposte[q.id];
  let ctrl;
  if(q.tipo === "sn"){
    ctrl = `<div class="toggle">`
      + `<button class="tg si ${v==='si'?'on':''}" aria-pressed="${v==='si'}" onclick="setSN('${q.id}','si')">Sì</button>`
      + `<button class="tg no ${v==='no'?'on':''}" aria-pressed="${v==='no'}" onclick="setSN('${q.id}','no')">No</button>`
      + `</div>`;
  } else {
    const ph = q.ph || (q.tipo==="pct" ? "0–100" : q.tipo==="eur" ? "0,00" : "0");
    const im = q.tipo==="testo" ? "text" : "decimal";
    const u  = q.u ? `<span class="q-unit">${q.u}</span>` : "";
    const cls = "q-input" + (q.u?" has-u":"") + (q.tipo==="testo"?" wide":"");
    ctrl = `<div class="${cls}">`
      + `<input id="inp-${q.id}" type="text" inputmode="${im}" ${attivo?'':'disabled'} value="${v??''}" placeholder="${ph}" aria-label="${q.t}" oninput="setVal('${q.id}',this.value)">`
      + u + `</div>`;
  }
  return `<div class="q-item ${attivo?'':'cond-off'}" data-q="${q.id}"><div class="testo"><span class="num">${q.id}</span>${q.t}</div>${ctrl}</div>`;
}

/* ---------- utilità ---------- */
const fmt = n => String(n).replace(/\B(?=(\d{3})+(?!\d))/g, "."); // separatore migliaia it-IT, indipendente dal locale
function giorniA(d){ return Math.max(0, Math.ceil((d - new Date())/86400000)); }
function oggi(){ return new Date().toLocaleDateString("it-IT"); }
function adesso(){ return new Date().toLocaleString("it-IT",{day:"2-digit",month:"2-digit",year:"numeric",hour:"2-digit",minute:"2-digit"}); }
let toastTimer;
function toast(msg, ok){
  const t = document.getElementById("toast");
  t.textContent = msg; t.className = "toast on" + (ok ? " ok" : "");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>{ t.className = "toast"; }, 3400);
}
function statoBadge(s){
  return {ric:'<span class="stato s-ric">Ricevuta</span>',comp:'<span class="stato s-comp">In compilazione</span>',soll:'<span class="stato s-soll">Sollecitata</span>',non:'<span class="stato s-non">Non avviata</span>'}[s];
}

/* ============================================================
   RENDER
   ============================================================ */
function render(){
  document.documentElement.style.setProperty("--blu", BR().colore);
  document.documentElement.style.setProperty("--blu-scuro", BR().colore2);
  const stage = document.getElementById("stage");
  stage.innerHTML = "";
  const s = document.createElement("div");
  s.className = "schermata visibile";
  s.innerHTML = SCHERMATE[stato.step]();
  stage.appendChild(s);

  // badge vista + fase 2
  const vb = document.getElementById("vistaBadge");
  if(stato.step === 10){ vb.textContent = "Vista Banca"; vb.className = "vista-badge vista-banca"; }
  else { vb.textContent = "Vista PMI"; vb.className = "vista-badge vista-pmi"; }
  document.getElementById("fase2Badge").style.display = (stato.step===1||stato.step===2) ? "block" : "none";
  document.getElementById("footerDemo").classList.toggle("dark", stato.step===10);
  const sl = document.getElementById("stepLabel");
  sl.textContent = (stato.step+1)+"/12 · "+NOMI_STEP[stato.step];
  sl.classList.toggle("dark", stato.step===10);

  // puntini + frecce
  const dots = document.getElementById("dots");
  dots.innerHTML = "";
  const prev = document.createElement("button");
  prev.className = "nav-freccia"; prev.textContent = "‹";
  prev.disabled = stato.step === 0;
  prev.setAttribute("aria-label","Schermata precedente");
  prev.onclick = indietro;
  dots.appendChild(prev);
  for(let i=0;i<N_STEP;i++){
    const d = document.createElement("button");
    d.className = "dot" + (i===stato.step ? " attivo" : "");
    d.title = (i+1)+". "+NOMI_STEP[i];
    d.setAttribute("aria-label", (i+1)+". "+NOMI_STEP[i]);
    if(i===stato.step) d.setAttribute("aria-current","step");
    d.onclick = ()=> vai(i);
    dots.appendChild(d);
  }
  const next = document.createElement("button");
  next.className = "nav-freccia"; next.textContent = "›";
  next.disabled = stato.step === N_STEP-1;
  next.setAttribute("aria-label","Schermata successiva");
  next.onclick = avanti;
  dots.appendChild(next);

  if(stato.step === 10) avviaDashboard();
}

function vai(n){
  if(n<0 || n>=N_STEP) return;
  if(n === 10 && stato.step !== 10){
    const it = document.getElementById("interstitial");
    it.classList.add("on");
    setTimeout(()=>{ it.classList.remove("on"); stato.step = 10; render(); }, 1900);
    return;
  }
  stato.step = n; render();
}
function avanti(){ vai(stato.step+1); }
function indietro(){ vai(stato.step-1); }

/* chip dei passi del percorso d'acquisto (schermate 3→8) */
function chipPassi(corrente){
  const passi = ["Clausole","Piano","Carrello","Account","Fatturazione","Pagamento"];
  return '<div class="passi">' + passi.map((p,i)=>{
    const idx = i+2; // step reale
    const cl = idx < corrente ? "fatto" : (idx === corrente ? "ora" : "");
    return `<span class="passo-chip ${cl}">${i+1}. ${p}</span>`;
  }).join("") + "</div>";
}

/* ============================================================
   SCHERMATE
   ============================================================ */
const SCHERMATE = [

/* ---------- 0 · Comunicazione dalla banca ---------- */
() => `
  <div class="msg-head">
    <div class="logo-banca"><span class="glifo">${BR().glifo}</span>${BR().nome}</div>
    <span class="badge-imp">Azione richiesta</span>

/* ============================================================
   AZIONI
   ============================================================ */
/* aggiornamento chirurgico: niente re-render completo, così scroll e focus restano dove sono */
function setSN(id,v){
  stato.risposte[id] = v;
  const item = document.querySelector('.q-item[data-q="'+id+'"]');
  if(!item){ render(); return; }
  const si = item.querySelector(".tg.si"), no = item.querySelector(".tg.no");
  si.classList.toggle("on", v==="si"); si.setAttribute("aria-pressed", v==="si");
  no.classList.toggle("on", v==="no"); no.setAttribute("aria-pressed", v==="no");
  // abilita / azzera le domande condizionali figlie ("se sì…")
  Q_TUTTE.filter(c => c.cond===id).forEach(c => {
    const ci = document.querySelector('.q-item[data-q="'+c.id+'"]');
    const inp = document.getElementById("inp-"+c.id);
    const att = v==="si";
    if(ci) ci.classList.toggle("cond-off", !att);
    if(inp){ inp.disabled = !att; if(!att){ inp.value=""; delete stato.risposte[c.id]; } }
  });
  aggProg();
}
function setVal(id,v){ if(v==="") delete stato.risposte[id]; else stato.risposte[id] = v; aggProg(); }
function aggProg(){
  const { done, tot } = qConteggio();
  const prog = document.querySelector(".q-prog");
  if(prog) prog.innerHTML = `<span>Campi completati: ${done} di ${tot}</span><span>${tot?Math.round(done/tot*100):0}%</span>`;
  const barra = document.querySelector(".q-barra div");
  if(barra) barra.style.width = (tot?done/tot*100:0)+"%";
  const btn = document.querySelector(".q-footer .btn");
  if(btn) btn.disabled = !(tot && done===tot);
}
function righeTabella(){
  const filtroOk = (s)=> stato.filtro==="tutti" || s===stato.filtro;
  const cerca = stato.ricerca.toLowerCase();
  return CONFIG.CLIENTI.map((c,i)=>{
    let [nome,seg,st,data] = c;
    if(i===0 && stato.notificaScattata){ st="ric"; data=oggi(); }
    if(!filtroOk(st) || (cerca && !nome.toLowerCase().includes(cerca))) return "";
    const cl = (i===0&&stato.flashRiga?'evidenzia ':'') + (st==='soll'?'cliccabile':'');
    const oc = st==='soll' ? ` onclick="apriSollecito('${nome.replace(/'/g,"\\'")}')"` : "";
    return `<tr class="${cl}"${oc}><td><b>${nome}</b></td><td>${seg}</td><td>${statoBadge(st)}</td><td>${data||"—"}</td></tr>`;
  }).join("");
}
function apriSollecito(nome){ stato.pannelloSoll = nome; render(); }
function aggiornaSim(){
  const ad = stato.simAdesione, q = stato.simQuota;
  const clienti = Math.round(CONFIG.N_CORPORATE * ad / 100);
  const ricavo = Math.round(clienti * 139.99 * q / 100);
  const set = (id,v)=>{ const el=document.getElementById(id); if(el) el.textContent=v; };
  set("lblAd", ad + "%"); set("lblQuota", q + "%");
  set("simClienti", fmt(clienti)); set("simRicavo", "€ " + fmt(ricavo));
}
function aggiornaTabella(){
  const tb = document.getElementById("tbodyClienti");
  if(tb) tb.innerHTML = righeTabella() || '<tr><td colspan="4" style="color:#8FA8C2">Nessun risultato</td></tr>';
}
function aggiornaRegistrati(){
  const b = document.getElementById("btnReg");
  if(b) b.disabled = !(stato.pec.includes("@") && stato.pwd.length>=8);
}
function pagaOra(){
  stato.pagamentoInCorso = true; render();
  setTimeout(()=>{ stato.pagamentoInCorso=false; stato.pagato=true; render(); }, 1700);
}
function firmaOra(){
  stato.firmaInCorso = true; render();
  setTimeout(()=>{ stato.firmaInCorso=false; stato.firmato=true; render(); }, 1800);
}

/* notifica dashboard (auto dopo 4s oppure tasto N) */
let notifTimer;
function avviaDashboard(){
  clearTimeout(notifTimer);
  if(!stato.notificaScattata){
    notifTimer = setTimeout(scattaNotifica, 4000);
  }
}
function scattaNotifica(){
  if(stato.step!==10 || stato.notificaScattata) return;
  stato.notificaScattata = true;
  stato.flashRiga = true;
  setTimeout(()=>{ stato.flashRiga = false; }, 2200);
  render();
  toast("Nuova autodichiarazione: "+CONFIG.PMI_NOME+" ha trasmesso il documento firmato", true);
  // animazione contatore
  const el = document.getElementById("kpiRic");
  if(el){
    el.textContent = fmt(CONFIG.N_RICEVUTE);
    setTimeout(()=>{ el.textContent = fmt(CONFIG.N_RICEVUTE+1); }, 600);
  }
}

/* ============================================================
   REGIA — tastiera, reset, autofill, ?step=n
   ============================================================ */
document.addEventListener("keydown", e=>{
  const t = e.target;
  if(t && (t.tagName==="INPUT" || t.tagName==="TEXTAREA" || t.tagName==="SELECT")) return; // guardia input
  const k = e.key.toLowerCase();
  if(e.key==="ArrowRight") avanti();
  else if(e.key==="ArrowLeft") indietro();
  else if(k==="r"){ stato = statoIniziale(); clearTimeout(notifTimer); render(); toast("Demo reimpostata"); }
  else if(k==="f"){
    if(stato.step===5){
      stato.pwd = "AuroraDemo2026"; render();
      toast("Credenziali precompilate (regia)");
    } else {
      stato.risposte = {...CONFIG.AUTOFILL};
      if(stato.step===8) render();
      toast("Questionario autocompilato (profilo virtuoso)");
    }
  }
  else if(k==="n"){ if(stato.step===10) scattaNotifica(); }
  else if(k==="b"){ stato.brandAlt = !stato.brandAlt; render(); toast("White-label attivo: " + BR().nome); }
  else if(e.key==="Escape"){ if(stato.modalVigilanza || stato.pannelloSoll){ stato.modalVigilanza=false; stato.pannelloSoll=null; render(); } }
});

/* parametro ?step=n (1-based) */
(function(){
  const m = location.search.match(/step=(\d+)/);
  if(m){ const n = parseInt(m[1],10)-1; if(n>=0 && n<N_STEP) stato.step = n; }
  if(/[?&]brand=alt/.test(location.search)) stato.brandAlt = true;
  if(/[?&]vig=1/.test(location.search)) stato.modalVigilanza = true;
  if(/[?&]soll=1/.test(location.search)) stato.pannelloSoll = "Trasporti Bellini S.r.l.";
  // prepara stato coerente se si parte avanti
  if(stato.step>=4 && !stato.piano) stato.piano="annuale";
  if(stato.step>=6 && stato.pwd.length<8) stato.pwd="demo12345";
  if(stato.step>=8 && !stato.pagato) stato.pagato=true;
  if(stato.step>=9 && !Object.keys(stato.risposte).length) stato.risposte={...CONFIG.AUTOFILL};
  if(stato.step>=10 && !stato.firmato) stato.firmato=true;
  render();
})();
