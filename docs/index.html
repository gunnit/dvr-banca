<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>DVR Banca — Demo</title>
<style>
  :root {
    --bg: #0f172a;
    --card: #1e293b;
    --text: #e2e8f0;
    --muted: #94a3b8;
    --accent: #38bdf8;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }
  main { max-width: 640px; width: 100%; }
  h1 { font-size: 1.75rem; margin-bottom: .5rem; }
  p.subtitle { color: var(--muted); margin-bottom: 2rem; }
  a.card {
    display: block;
    background: var(--card);
    border: 1px solid #334155;
    border-radius: 12px;
    padding: 1.25rem 1.5rem;
    margin-bottom: 1rem;
    text-decoration: none;
    color: var(--text);
    transition: border-color .2s, transform .2s;
  }
  a.card:hover { border-color: var(--accent); transform: translateY(-2px); }
  a.card h2 { font-size: 1.1rem; margin-bottom: .25rem; color: var(--accent); }
  a.card span { color: var(--muted); font-size: .9rem; }
  footer { margin-top: 2rem; color: var(--muted); font-size: .8rem; }
</style>
</head>
<body>
<main>
  <h1>DVR Banca</h1>
  <p class="subtitle">Demo della piattaforma — settore bancario</p>

  <a class="card" href="demo_banca_esg.html">
    <h2>Demo Piattaforma DVR / ESG</h2>
    <span>Demo interattiva della piattaforma per la gestione DVR in ambito bancario</span>
  </a>

  <a class="card" href="user-stories-dashboard.html">
    <h2>Dashboard User Stories</h2>
    <span>Panoramica interattiva delle user stories e dello stato di avanzamento</span>
  </a>

  <footer>Niuexa / N2O S.r.l. — materiale dimostrativo</footer>
</main>
</body>
</html>
